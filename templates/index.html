<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fabric Defect Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }

        .card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .card-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .card-body {
            padding: 40px;
            background-color: #fff;
        }

        .upload-box {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            transition: 0.3s ease;
        }

        .upload-box:hover {
            border-color: #4facfe;
            background: #f0f9ff;
        }

        .file-input {
            display: none;
        }

        .btn-custom {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            margin-top: 30px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .card-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧵 Fabric Defect Detection</h1>
            <p>Upload a fabric image to detect possible defects using our AI-based detection model.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📤 Upload Fabric Image</h2>
                <p>Supports JPG, JPEG(Max 10MB)</p>
            </div>
            <div class="card-body">
                <form method="POST" action="/predict" enctype="multipart/form-data" class="text-center" id="uploadForm">
                    <label for="file" class="upload-box" id="uploadLabel">
                        <div id="uploadText">📁 Click to select your fabric image</div>
                        <input class="file-input" type="file" name="file" id="file" required accept="image/*" required>
                    </label>
                    <button type="submit" class="btn btn-custom">🔍 Predict</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file');
        const uploadText = document.getElementById('uploadText');

        fileInput.addEventListener('change', function () {
            if (fileInput.files.length > 0) {
                uploadText.textContent = '✅ ' + fileInput.files[0].name + ' selected';
            } else {
                uploadText.textContent = '📁 Click to select your fabric image';
            }
        });
    </script>
</body>
</html>
